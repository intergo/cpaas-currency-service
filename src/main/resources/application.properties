# Redis
quarkus.redis.hosts=redis://${REDIS_HOST}:${REDIS_PORT}
currency.rate.cache.ttl=21600

# PostgreSQL datasource
quarkus.datasource.db-kind=PostgreSQL
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_REMOTE_HOST}/${DB_NAME}
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}

# Liquibase
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/db-changelog-root.xml

# App config
app.base-currency=EUR

quarkus.http.port=${QUARKUS_HTTP_PORT:8085}
